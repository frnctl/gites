<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'none'; img-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <title>Best Friend — Préparer le transfert</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1d1d1f;background:#f5f5f7}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px}
    main{width:min(650px,100%);background:#fff;border:1px solid #dedee3;border-radius:30px;padding:clamp(26px,6vw,48px);box-shadow:0 22px 65px rgba(0,0,0,.09);text-align:center}
    .mark{width:64px;height:64px;margin:0 auto 20px;border-radius:20px;background:#1d1d1f;color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px}
    h1{font-size:clamp(28px,6vw,40px);letter-spacing:-.04em;margin:0 0 12px}
    p{font-size:17px;line-height:1.55;color:#6e6e73}
    button{appearance:none;border:0;border-radius:16px;background:#0071e3;color:#fff;padding:16px 22px;font-size:18px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
    button:disabled{opacity:.55;cursor:wait}
    #status{min-height:72px;margin-top:18px;border-radius:18px;padding:15px;background:#f5f5f7;display:flex;align-items:center;justify-content:center;line-height:1.45}
    .ok{background:#eaf7ee!important;color:#176b34}
    .error{background:#fff0f0!important;color:#9d1c1c}
    small{display:block;margin-top:18px;color:#86868b;line-height:1.45}
    iframe{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;border:0}
  </style>
</head>
<body>
  <main>
    <div class="mark">BF</div>
    <h1>Préparer le transfert</h1>
    <p>Un clic suffit. Best Friend rassemble les données enregistrées sur cet appareil et crée une sauvegarde vérifiée.</p>
    <button id="exportButton">Télécharger ma sauvegarde</button>
    <div id="status">Aucune donnée ne quitte cet appareil.</div>
    <small>Le fichier téléchargé pourra ensuite être restauré dans le nouvel espace. Cette page ne possède aucun accès réseau.</small>
  </main>
  <iframe id="legacyApp" title="Préparation des anciennes données"></iframe>
  <script src="../backup.js"></script>
  <script>
    'use strict';
    const button=document.getElementById('exportButton');
    const status=document.getElementById('status');

    function readStorage(key){
      try{
        const raw=localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      }catch(error){
        throw new Error('Les anciennes données sont illisibles. Elles n’ont pas été modifiées.');
      }
    }

    async function waitForV2(){
      let data=readStorage('gites_v2');
      if(data) return data;
      if(!localStorage.getItem('gites_v1')) return null;

      status.textContent='Préparation automatique de l’ancien format…';
      const frame=document.getElementById('legacyApp');
      frame.src='../?prepare-transfer=1&ts='+Date.now();
      await new Promise(resolve=>{
        const timer=setTimeout(resolve,5000);
        frame.onload=()=>setTimeout(()=>{ clearTimeout(timer); resolve(); },800);
      });
      data=readStorage('gites_v2');
      return data;
    }

    function download(name, content){
      const url=URL.createObjectURL(new Blob([content],{type:'application/json'}));
      const link=document.createElement('a');
      link.href=url;
      link.download=name;
      link.click();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }

    button.onclick=async()=>{
      button.disabled=true;
      status.className='';
      status.textContent='Vérification des données…';
      try{
        const raw=await waitForV2();
        if(!raw) throw new Error('Aucune ancienne donnée trouvée sur cet appareil.');
        const normalized=await BFBackup.parseBackup(raw);
        const envelope=await BFBackup.createEnvelope(normalized.data,{
          origin:location.origin,
          storage:'gites_v2',
          bridgeVersion:1
        });
        download(BFBackup.fileName('best-friend-transfert'),JSON.stringify(envelope,null,2));
        const count=envelope.counts;
        status.className='ok';
        status.textContent=`Sauvegarde prête : ${count.apartments} bien(s), ${count.reservations} réservation(s), ${count.interventions} intervention(s) et ${count.contacts} contact(s).`;
      }catch(error){
        console.warn('legacy export',error);
        status.className='error';
        status.textContent=error.message||'La sauvegarde n’a pas pu être créée.';
      }finally{
        button.disabled=false;
      }
    };
  </script>
</body>
</html>
